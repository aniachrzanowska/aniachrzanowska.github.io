      - title: 'Optogenetic fUSI for brain-wide mapping of neural activity mediating
          collicular-dependent behaviors'
        authors:
          - Arnau Sans-Dublanc*
          - '**Anna Chrzanowska***'
          - Katja Reinhard
          - Dani Lemmon
          - Bram Nuttin
          - Théo Lambert
          - Gabriel Montaldo
          - Alan Urban#
          - Karl Farrow#
        doi: 10.1016/j.neuron.2021.04.008
        journal: Neuron
        date: 2021
        highlights:
          - '(*equal contribution)'
          - 'Impact: Demonstrated that optogenetic activation of different
            neuronal populations in the superior colliculus each triggers
            diverse behaviors.'
          - 'Contribution: Co-lead author, performed the key experiments,
            conceptualization of the study, experimental design, data analysis,
            manuscript writing and editing'
      - title: 'Research culture: science from bench to society'
        authors:
          - Lorenzo Canti
          - '**Anna Chrzanowska**'
          - M. Giulia Doglio
          - Lia Martina
          - Tim Van Den Bossche
        doi: 10.1242/bio.058919
        journal: Biology Open
        date: 2021
        highlights:
          - '(all authors contributed equally)'
          - 'Impact: This article disseminates the values of research culture in
            science practices.'
          - 'Contribution: Conceptualization, manuscript writing and editing'
      - title: Multiple excitatory actions of orexins upon thalamo-cortical neurons in
          dorsal lateral geniculate nucleus – implications for vision modulation
          by arousal
        authors:
          - Lukasz Chrobok
          - Katarzyna Palus
          - '**Anna Chrzanowska**'
          - Mariusz Kępczyński
          - Marian Lewandowski
        doi: 10.1038/s41598-017-08202-8
        journal: Scientific Reports
        date: 2017
        highlights:
          - 'Impact: This work offers insights into the impact of orexinergic
            modulation in the visual thalamus.'
          - 'Contribution: Performed immunohistochemical studies, data analysis
            and interpretation, manuscript editing'
      - title: Disinhibition of the intergeniculate leaflet network in the WAG/Rij rat
          model of absence epilepsy
        authors:
          - Lukasz Chrobok
          - Katrzyna Palus
          - Jagoda S Jeczmien-Lazur
          - '**Anna Chrzanowska**'
          - Mariusz Kepczyński
          - Marian Lewandowski
        doi: 10.1016/j.expneurol.2016.12.014
        journal: Experimental Neurology
        date: 2017
        highlights:
          - 'Impact: This work shows for the first time the disinhibition of
            intergeniculate leaflet (IGL) neurons in a model of absence
            epilepsy.'
          - 'Contribution: Performed immunohistochemical studies, data analysis
            and interpretation, manuscript editing'
      - title: The role of collicular cell types in behavioral reactions to different
          threat intensities in mice
        authors:
          - Bram Nuttin*
          - '**Anna Chrzanowska***'
          - Amber Bruynsteen
          - Arnau Sans-Dublanc#
          - Karl Farrow#
        journal: In preparation
        highlights:
          - '(*equal contribution)'
          - 'Impact: Demonstrated that behavioral reaction strength to stimuli
            increases with the perceived threat intensity.'
          - 'Contribution: Co-lead author, performed the key experiments,
            conceptualization of the study, experimental design, data analysis,
            manuscript writing and editing'
