  sections:
    summary:
      - Experienced neuroscientist with 10+ years of expertise in behavioral systems neuroscience. Specialized in a range of rodent behavioral assays, neural circuit genetic manipulations, and neural activity recordings (both *in vivo* freely-moving and head-fixed electrophysiology). Skilled in experimental setup design, optimization, and troubleshooting, as well as performing microsurgeries. Demonstrated success in securing fellowships, admissions to competitive training programs, and travel grants. Proven leadership in mentoring Master's and Bachelor's students. Actively involved in organizing symposia and conferences, and in science popularization. Engaged member of the international community of young neuroscientists.
    skills:
      - label: Technical
        details: Rodent behavioral assays, neural circuit genetic manipulations, *in vivo* electrophysiology (freely-moving & head-fixed), two-photon calcium imaging, microsurgeries, brain histology, viral injections, optogenetics, chemogenetics, patch clamp recordings (*in vitro*).
      - label: Engineering & Software
        details: Experimental setup design, optimization, troubleshooting, Bonsai reactive programming, Arduino, electronics, virtual reality environments for mice.
      - label: Professional
        details: Mentoring, project supervision, scientific writing, manuscript editing, organizing symposia and conferences, science popularization.
